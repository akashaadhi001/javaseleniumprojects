name: Validate and Sync master to env branches

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-and-sync:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install Chrome
        shell: pwsh
        run: |
          $chromeUrl = "https://dl.google.com/chrome/install/latest/chrome_installer.exe"
          Invoke-WebRequest -Uri $chromeUrl -OutFile "$env:TEMP\chrome_installer.exe"
          Start-Process "$env:TEMP\chrome_installer.exe" -ArgumentList "/silent /install" -Wait

      - name: Build and test
        shell: pwsh
        run: |
          mvn -B test

      - name: Configure git
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync master to dev, qa and prod
        shell: pwsh
        run: |
          foreach ($branch in @('dev','qa','prod')) {
            Write-Host "Syncing master -> $branch"
            git push origin HEAD:refs/heads/$branch
          }
